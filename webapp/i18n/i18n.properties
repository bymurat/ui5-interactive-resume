overviewText=I started working with SAP technologies in 2013 and have grown from a JavaScript-focused SAPUI5 and SAP Fiori developer into a full-stack SAP cloud application developer. Over the last 4-5 years, I have deepened my expertise in SAP CAP, SAP BTP, Fiori elements, metadata-driven UIs, and TypeScript while working on enterprise projects, including SAP SE work in Private Cloud and ECS, Enterprise Cloud Services. My day-to-day work includes building and maintaining UI5 and CAP applications, collaborating in agile teams, using Git professionally, and contributing to CI/CD operations with GitHub Actions.
